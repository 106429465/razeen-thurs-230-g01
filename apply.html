<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apply to HealThML</title>
    <link href="styles/apply_style.css" rel="stylesheet">
  </head>
  <body>
    <header>
      <h1>Apply to HealThML</h1>
    </header>
    <nav id="nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="job_description.html">Job Description</a></li>
            <li><a class="nav_active" href="apply.html">Apply</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>
    <main>
     <p>We would love for you to be a part of our team, please fill out the form below and we'll get back to you shortly!</p>
     <form action="https://mercury.swin.edu.au/it000000/formtest.php" method="post">
       <label for="job reference number">Job reference number</label>
        <input type="text" id="job reference number" name="job reference number" required pattern=".{5}"><br><br>
       <label for="first name">First name</label>
        <input type="text" id="first name" name="first name" required pattern="[A-za-z]{1,20}"><br><br>
       <label for="last name">Last name</label>
        <input type="text" id="last name" name="last name" required pattern="[A-za-z]{1,20}"><br><br>
       <label for="date of birth">Date of birth</label>
        <input type="date" id="date of birth" name="date of birth" required><br><br>
       <label for="gender">Gender</label><br><br>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male" class="gender">Male</label> 
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female" class="gender">Female</label>
        <input type="radio" id="other" name="gender" value="other" required>
        <label for="other" class="gender">Other</label><br><br>
        <label for="street address">Street address</label>
        <input type="text" id="street address" name="street address" required><br><br>
        <label for="suburb">Suburb</label>
        <input type="text" id="suburb" name="suburb" required><br><br>
        <label for="state">State</label>
        <select id="state" name="state" required>
          <option value="">Select a state</option>
          <option value="VIC">VIC</option>
          <option value="NSW">NSW</option>
          <option value="QLD">QLD</option>
          <option value="NT">NT</option>
          <option value="WA">WA</option> 
          <option value="SA">SA</option>
          <option value="TAS">TAS</option>
          <option value="ACT">ACT</option>
          </select><br><br>
       <label for="email">Email</label>
        <input type="email" id="email" name="email" required><br><br>
       <label for="phone number">Phone number</label>
        <input type="tel" id="phone number" name="phone number" required pattern="[0-9]{10}"><br><br>
        <input type="submit" value="Submit">
        </form>
    </main>
  </body>
</html>
